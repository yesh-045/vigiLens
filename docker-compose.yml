services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command:
      - uvicorn
      - vigilens.apps.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-vigilens-tests}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      DB_PATH: /data/streams.db
    volumes:
      - sqlite_data:/data
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  stream_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command:
      - python
      - -m
      - vigilens.apps.workers.stream.worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-vigilens-tests}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      STREAM_TMP_DIR: /tmp/streams
      DB_PATH: /data/streams.db
    volumes:
      - stream_tmp:/tmp/streams
      - sqlite_data:/data
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  llm_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command:
      - python
      - -m
      - vigilens.apps.workers.llm.worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-vigilens-tests}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      DB_PATH: /data/streams.db
    volumes:
      - sqlite_data:/data
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  scene_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command:
      - python
      - -m
      - vigilens.apps.workers.scene.worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-vigilens-tests}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      DB_PATH: /data/streams.db
    volumes:
      - sqlite_data:/data
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minio} ${AWS_SECRET_ACCESS_KEY:-minio123}
        mc mb -p local/${S3_BUCKET:-vigilens-tests} || true
    restart: "no"

volumes:
  redis_data:
  minio_data:
  stream_tmp:
  sqlite_data:
